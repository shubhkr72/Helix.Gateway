server:
  port: 8080

timeouts:
  dial: 5s
  response_header: 10s

jwt:
  issuer: helix-auth
  audience: helix-api
  public_key: keys/public.pem

routes:
  - id: auth
    path: /auth
    backend:
      - http://localhost:9001
    strip_prefix: true
    public: true
    rate_limit:
      capacity: 5
      refill_rate: 2
      key_strategy: ip

  - id: users
    path: /users
    backend:
      - http://localhost:9002
    strip_prefix: true
    authenticated: true
    rate_limit:
      capacity: 100
      refill_rate: 20
      key_strategy: user

  - id: orders
    path: /orders
    backend:
      - http://localhost:9003
    strip_prefix: false
    authenticated: true
    rate_limit:
      capacity: 50
      refill_rate: 10
      key_strategy: user

  - id: payments
    path: /payments
    backend:
      - http://localhost:9004
    strip_prefix: false
    authenticated: true
    rate_limit:
      capacity: 20
      refill_rate: 5
      key_strategy: user

  - id: inventory
    path: /inventory
    backend:
      - http://localhost:9005
    strip_prefix: true
    authenticated: true
    rate_limit:
      capacity: 50
      refill_rate: 10
      key_strategy: user

  - id: products
    path: /products
    backend:
      - http://localhost:9006
    strip_prefix: true
    public: true
    rate_limit:
      capacity: 200
      refill_rate: 50
      key_strategy: ip

  - id: notifications
    path: /notifications
    backend:
      - http://localhost:9007
    strip_prefix: false
    authenticated: true
    rate_limit:
      capacity: 30
      refill_rate: 5
      key_strategy: user

  - id: analytics
    path: /analytics
    backend:
      - http://localhost:9008
    strip_prefix: false
    authenticated: true
    roles:
      - admin
    rate_limit:
      capacity: 10
      refill_rate: 2
      key_strategy: user

  - id: reviews
    path: /reviews
    backend:
      - http://localhost:9009
    strip_prefix: true
    public: true
    rate_limit:
      capacity: 100
      refill_rate: 20
      key_strategy: ip

  - id: search
    path: /search
    backend:
      - http://localhost:9010
    strip_prefix: true
    public: true
    rate_limit:
      capacity: 300
      refill_rate: 100
      key_strategy: ip